<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="./logo.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <title>晴探</title>

    <!-- 微信/社交分享卡片：标题 + 描述 + 缩略图（被微信抓取后展示为卡片） -->
    <meta name="description" content="纵览假日风云，于晴好处启程" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="晴探" />
    <meta property="og:title" content="晴探" />
    <meta property="og:description" content="纵览假日风云，于晴好处启程" />
    <meta property="og:url" content="https://cloydlau.github.io/playground/sunquest/" />
    <meta property="og:image" content="https://cloydlau.github.io/playground/sunquest/logo.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:locale" content="zh_CN" />
    <!-- 部分抓取器（含微信）会读取以下字段 -->
    <meta itemprop="name" content="晴探" />
    <meta itemprop="description" content="纵览假日风云，于晴好处启程" />
    <meta itemprop="image" content="https://cloydlau.github.io/playground/sunquest/logo.png" />
    <script type="module" crossorigin src="./2026-07-20_16-43-00/index.js"></script>
    <link rel="stylesheet" crossorigin href="./2026-07-20_16-43-00/index.css">
  </head>
  <body>
    <!-- 兜底缩略图：微信抓取页面图片时优先取到此图（对用户不可见） -->
    <img
      src="https://cloydlau.github.io/playground/sunquest/logo.png"
      width="512"
      height="512"
      alt="晴探"
      style="position: fixed; left: -9999px; top: -9999px; opacity: 0; pointer-events: none"
    />
    <div id="app"></div>
  </body>
</html>
